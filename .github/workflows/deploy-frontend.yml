name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'server/skills/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'preview | production'
        required: true
        default: 'preview'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: |
          if [ "${{ github.event.inputs.target }}" = "production" ] || [ "${{ github.event_name }}" = "push" ]; then
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          else
            vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          fi

      - name: Build
        run: |
          if [ "${{ github.event.inputs.target }}" = "production" ] || [ "${{ github.event_name }}" = "push" ]; then
            vercel build --prod --token="$VERCEL_TOKEN"
          else
            vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy
        id: deploy
        run: |
          if [ "${{ github.event.inputs.target }}" = "production" ] || [ "${{ github.event_name }}" = "push" ]; then
            URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          else
            URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"

      - name: Smoke /eligibility
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          if [ -z "$URL" ]; then
            echo "No URL captured; skipping smoke."
            exit 0
          fi
          # Eligibility route should respond 200 even unauthenticated.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/eligibility" || echo "000")
          echo "/eligibility returned $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::/eligibility did not return 200 on first hit (cold-start ok up to ~10s)"
          fi
