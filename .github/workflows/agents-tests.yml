name: agents-tests

on:
  push:
    paths:
      - 'agents-permitmonkey/**'
      - '.github/workflows/agents-tests.yml'
  pull_request:
    paths:
      - 'agents-permitmonkey/**'
  workflow_dispatch:

jobs:
  unit-tests:
    name: agents unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents-permitmonkey
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run unit tests
        run: npm test
